name: Feature Request
description: Propose an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea?  
        Describe what you'd like and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What limitation or friction are you trying to solve?
      placeholder: |
        I find myself wanting to…
        Currently the plugin does not…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behaviour or API you have in mind.
      placeholder: The plugin could expose an option…
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought of?

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, etc.
